function openManual(prefillItemId){
  const allActive=(isTeamView()?teamViewItems:items).filter(i=>!i.done);
  const sel=document.getElementById("manual-task-sel");
  if(!sel) return;
  sel.innerHTML=allActive.map(i=>`<option value="${i.id}"${i.id===prefillItemId?" selected":""}>${esc(i.text)}</option>`).join("");
  document.getElementById("manual-date").value=isoToday();
  document.getElementById("manual-hours").value="";
  document.getElementById("manual-note").value="";
  document.getElementById("manual-overlay").classList.add("open");
  document.getElementById("manual-hours").focus();
}

function closeManual(){
  document.getElementById("manual-overlay").classList.remove("open");
}

async function saveManualEntry(){
  const itemId=document.getElementById("manual-task-sel").value;
  const date=document.getElementById("manual-date").value;
  const hoursRaw=parseFloat(document.getElementById("manual-hours").value);
  const note=document.getElementById("manual-note").value.trim();
  if(!itemId||!date||!hoursRaw||hoursRaw<=0){showError("Please fill in task, date and hours.");return;}
  const itemSnap={...(isTeamView()?teamViewItems:items).find(i=>i.id===itemId)};
  if(!itemSnap.id){showError("Task not found.");return;}
  closeManual();
  currentView="timesheets"; // switch view before renderList so it shows correctly after save
  await addTimeSession(itemSnap,{date,h:Math.round(hoursRaw*100)/100,note:note||"Manual"});
}

// ── ClickUp Integration ───────────────────────────────────
const CU_PRIORITY_MAP = { 1:"🔴 Urgent", 2:"🟠 High", 3:"🟡 Normal", 4:"⚪ Low" };
const CU_PRIORITY_IMP = { 1:"high", 2:"high", 3:"medium", 4:"low" };
const CU_ALLOWED_SPACES = ["Livetech Main", "Monthly Maintenance"];
const CU_DEFAULT_ACTIVE_STATUSES = [
  "in progress", "open", "active leads - responded",
  "prospects - get back", "potentials - on radar", "review or stuck"
];

// Generate current month label e.g. "March 2026"
function cuCurrentMonthLabel(){
  return new Date().toLocaleDateString("en-GB", { month:"long", year:"numeric" });
}

let cuSpaces = [];
let cuLoading = false;
let cuLoaded = false;
let cuFilter = "all";
let cuSearch = "";
let cuListOpen = {};        // "listId" -> bool (list sections open/closed)
let cuStatusOpen = {};      // "listId-statusName" -> bool (status groups open/closed)
let cuCopiedIds = new Set();
let cuTaskCache = {};       // taskId -> task object (avoids serialising JSON into onclick)
let cuActiveStatuses = new Set();
let cuAllStatuses = [];

async function cuFetch(path){
  const res = await fetch(CLAUDE_PROXY + "/clickup/" + path, {
    headers:{ "Content-Type":"application/json" }
  });
  if(!res.ok) throw new Error("ClickUp API error "+res.status);
  return res.json();
}

async function loadClickUpTasks(){
  cuLoading = true;
  cuLoaded = false;
  renderList();
  try{
    const spacesRes = await cuFetch("team/"+CLICKUP_TEAM_ID+"/space?archived=false");
    const spaces = (spacesRes.spaces||[]).filter(s =>
      CU_ALLOWED_SPACES.some(a => s.name.trim().toLowerCase() === a.toLowerCase())
    );

    cuSpaces = await Promise.all(spaces.map(async space => {
      const isMonthly = space.name.trim().toLowerCase() === "monthly maintenance";
      const [listsRes, foldersRes] = await Promise.all([
        cuFetch("space/"+space.id+"/list?archived=false"),
        cuFetch("space/"+space.id+"/folder?archived=false")
      ]);

      let allLists = (listsRes.lists||[]).map(l=>({...l, folderName:null}));

      if(!isMonthly){
        // For Livetech Main: include folder lists too
        for(const folder of (foldersRes.folders||[])){
          const fl = await cuFetch("folder/"+folder.id+"/list?archived=false");
          (fl.lists||[]).forEach(l => allLists.push({...l, folderName:folder.name}));
        }
      } else {
        // For Monthly Maintenance: only the list matching current month name
        // Check both direct lists and folder lists
        const currentMonth = cuCurrentMonthLabel().toLowerCase();
        // Also check folder lists in case it's nested
        for(const folder of (foldersRes.folders||[])){
          const fl = await cuFetch("folder/"+folder.id+"/list?archived=false");
          (fl.lists||[]).forEach(l => allLists.push({...l, folderName:folder.name}));
        }
        allLists = allLists.filter(l => l.name.trim().toLowerCase() === currentMonth);
      }

      // Fetch tasks for filtered lists
      const listsWithTasks = await Promise.all(allLists.map(async list => {
        try{
          const tr = await cuFetch("list/"+list.id+"/task?archived=false&include_closed=false&subtasks=false");
          return {...list, tasks: tr.tasks||[]};
        }catch{ return {...list, tasks:[]}; }
      }));

      // Default: start collapsed
      listsWithTasks.forEach(l => {
        if(cuListOpen[l.id] === undefined) cuListOpen[l.id] = false;
        l.tasks.forEach(t => {
          const key = l.id+"-"+(t.status?.status||"No Status");
          if(cuStatusOpen[key] === undefined) cuStatusOpen[key] = false;
        });
      });

      return {
        id: space.id,
        name: space.name,
        isMonthly,
        lists: listsWithTasks.filter(l => l.tasks.length > 0)
      };
    }));

    // Collect all unique statuses
    const statusMap = {};
    cuSpaces.forEach(sp => sp.lists.forEach(l => l.tasks.forEach(t => {
      if(t.status){
        const key = (t.status.status||"").toLowerCase();
        if(!statusMap[key]) statusMap[key] = {
          status: t.status.status,
          color: t.status.color||"#aaa",
          type: t.status.type||"custom"
        };
      }
    })));
    cuAllStatuses = Object.values(statusMap);
    // Auto-select all non-closed statuses so tasks show by default
    cuActiveStatuses = new Set(cuAllStatuses.filter(s=>s.type!=="closed"&&s.type!=="done").map(s=>s.status.toLowerCase()));

    // Build copied IDs
    cuCopiedIds = new Set(
      items.map(i => { const m=(i.sub||"").match(/\|\|CU:([^|]+)/); return m?m[1]:null; }).filter(Boolean)
    );

    // Cache all tasks by ID for safe onclick reference
    cuTaskCache = {};
    cuSpaces.forEach(sp => sp.lists.forEach(l => l.tasks.forEach(t => { cuTaskCache[t.id] = t; })));

    // Build name -> ClickUp user id map from team members
    try{
      const membersRes = await cuFetch("team/"+CLICKUP_TEAM_ID);
      ((membersRes.team?.members)||[]).forEach(m=>{
        const name=(m.user?.username||m.user?.email||"").toLowerCase();
        const id=m.user?.id;
        if(name&&id) cuUserIdMap[name]=id;
      });
    }catch(e){ /* non-fatal */ }
    // Also seed from task assignees already loaded
    cuSpaces.forEach(sp=>sp.lists.forEach(l=>l.tasks.forEach(t=>(t.assignees||[]).forEach(a=>{
      const n=(a.username||a.email||"").toLowerCase();
      if(n&&a.id) cuUserIdMap[n]=a.id;
    }))));
    console.log("ClickUp user ID map:", cuUserIdMap);

    cuLoaded = true;
  }catch(e){
    cuLoaded = false;
    cuSpaces = [{id:"error", name:"Error", lists:[], _error:e.message}];
  }
  cuLoading = false;
  renderList();
}

function cuPassesFilters(task){
  // Status chip filter
  const statusKey = (task.status?.status||"").toLowerCase();
  if(cuActiveStatuses.size > 0 && !cuActiveStatuses.has(statusKey)) return false;
  // Assignee filter
  if(cuFilter === "mine"){
    const assignees = (task.assignees||[]).map(a=>(a.username||a.email||"").toLowerCase());
    const myEmail = (msalInstance.getActiveAccount()?.username||"").toLowerCase();
    if(!assignees.some(a => a.includes(myEmail.split("@")[0]))) return false;
  }
  // Overdue filter
  if(cuFilter === "overdue"){
    if(!task.due_date) return false;
    const due = new Date(parseInt(task.due_date)); due.setHours(0,0,0,0);
    if(due >= new Date(isoToday()+"T00:00:00")) return false;
  }
  // Search
  if(cuSearch && !(task.name||"").toLowerCase().includes(cuSearch.toLowerCase())) return false;
  return true;
}

function cuFormatDue(dueMsStr){
  if(!dueMsStr) return null;
  const d = new Date(parseInt(dueMsStr));
  const td = new Date(); td.setHours(0,0,0,0); d.setHours(0,0,0,0);
  const diff = Math.round((d-td)/86400000);
  const label = diff===0?"Today":diff===1?"Tomorrow":diff===-1?"Yesterday"
    :diff<0?d.toLocaleDateString("en-GB",{day:"numeric",month:"short"})
    :d.toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"});
  return { label, overdue:diff<0, isoDate:d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()) };
}

function toggleCuStatus(key){
  if(cuActiveStatuses.has(key)) cuActiveStatuses.delete(key);
  else cuActiveStatuses.add(key);
  renderList();
}
function cuSelectAllStatuses(){ cuAllStatuses.forEach(s=>cuActiveStatuses.add(s.status.toLowerCase())); renderList(); }
function cuClearAllStatuses(){ cuActiveStatuses.clear(); renderList(); }
function toggleCuList(id){ cuListOpen[id]=!cuListOpen[id]; renderList(); }
function toggleCuStatusGroup(key){ cuStatusOpen[key]=cuStatusOpen[key]===false?true:false; renderList(); }
function setCuFilter(f){ cuFilter=f; renderList(); }
function cuSearchInput(v){ cuSearch=v; renderList(); }
function cuOpenTask(url){ if(url) window.open(url,"_blank"); }

function renderStatusChips(){
  if(!cuAllStatuses.length) return "";
  const active = cuAllStatuses.filter(s=>s.type!=="closed"&&s.type!=="done");
  const closed = cuAllStatuses.filter(s=>s.type==="closed"||s.type==="done");
  const chip = s => {
    const key = s.status.toLowerCase();
    const on = cuActiveStatuses.has(key);
    const col = s.color||"#aaa";
    const style = on
      ? `background:${col}33;color:${col};border-color:${col}`
      : `background:#f5f5f3;color:#bbb;border-color:#e0ddd6`;
    return `<button class="cu-status-chip" style="${style}" onclick="toggleCuStatus('${key.replace(/'/g,"\\'")}')">${esc(s.status)}</button>`;
  };
  return `<div class="cu-status-filter">
    <div class="cu-status-filter-row">
      <span class="cu-status-group-label">Filter by status</span>
      <button class="cu-chip-toggle-all" onclick="cuSelectAllStatuses()">All</button>
      <button class="cu-chip-toggle-all" onclick="cuClearAllStatuses()">None</button>
    </div>
    <div class="cu-chips-wrap">
      ${active.map(chip).join("")}
      ${closed.length?`<span class="cu-status-divider"></span>${closed.map(chip).join("")}`:""}
    </div>
  </div>`;
}

function renderListSection(list){
  const filtered = list.tasks.filter(cuPassesFilters);
  if(!filtered.length) return "";
  const isOpen = cuListOpen[list.id] !== false;

  // Group tasks by status within this list
  const byStatus = {};
  filtered.forEach(t => {
    const key = t.status?.status||"No Status";
    if(!byStatus[key]) byStatus[key] = {color:t.status?.color||"#aaa", tasks:[]};
    byStatus[key].tasks.push(t);
  });
  const statusOrder = CU_DEFAULT_ACTIVE_STATUSES;
  const sortedGroups = Object.entries(byStatus).sort(([a],[b])=>{
    const ai=statusOrder.indexOf(a.toLowerCase()), bi=statusOrder.indexOf(b.toLowerCase());
    if(ai===-1&&bi===-1) return a.localeCompare(b);
    if(ai===-1) return 1; if(bi===-1) return -1;
    return ai-bi;
  });

  const listLabel = list.folderName ? list.folderName+" / "+list.name : list.name;

  return `<div class="cu-list-section">
    <div class="cu-list-header" onclick="toggleCuList('${list.id}')">
      <span class="cu-list-arrow${isOpen?" open":""}">▶</span>
      <span class="cu-list-name">📋 ${esc(listLabel)}</span>
      <span class="cu-list-count">${filtered.length}</span>
    </div>
    <div class="cu-list-body${isOpen?" open":""}">
      ${sortedGroups.map(([statusName, group])=>{
        const sgKey = list.id+"-"+statusName;
        const sgOpen = cuStatusOpen[sgKey] !== false;
        return `<div class="cu-status-group">
          <div class="cu-status-group-header" onclick="toggleCuStatusGroup('${sgKey.replace(/'/g,"\\'")}')">
            <span class="cu-list-arrow${sgOpen?" open":""}" style="font-size:7px;color:#ccc">▶</span>
            <span class="cu-status-group-dot" style="background:${group.color}"></span>
            <span class="cu-status-group-name">${esc(statusName)}</span>
            <span class="cu-status-group-count">${group.tasks.length}</span>
          </div>
          <div style="display:${sgOpen?"block":"none"}">
            ${group.tasks.map(t=>renderCuTask(t)).join("")}
          </div>
        </div>`;
      }).join("")}
    </div>
  </div>`;
}

function renderProjectsView(){
  if(cuLoading) return `<div class="cu-loading">Loading ClickUp tasks...</div>`;

  const totalVisible = cuSpaces.filter(s=>s.id!=="error")
    .reduce((s,sp)=>s+sp.lists.reduce((ss,l)=>ss+l.tasks.filter(cuPassesFilters).length,0),0);

  return `<div class="cu-wrap">
    <div class="cu-toolbar">
      <button class="cu-filter-btn${cuFilter==="all"?" active":""}" onclick="setCuFilter('all')">All</button>
      <button class="cu-filter-btn${cuFilter==="mine"?" active":""}" onclick="setCuFilter('mine')">Assigned to me</button>
      <button class="cu-filter-btn${cuFilter==="overdue"?" active":""}" onclick="setCuFilter('overdue')">Overdue</button>
      <input class="cu-search" placeholder="Search tasks..." value="${esc(cuSearch)}" oninput="cuSearchInput(this.value)"/>
      <button class="cu-refresh-btn" onclick="loadClickUpTasks()" title="Refresh">↻</button>

async function cuCopyTask(taskId){
  const task = cuTaskCache[taskId];
  if(!task){ showError("Task not found — try refreshing the Projects view."); return; }
  const due = cuFormatDue(task.due_date);
  const imp = task.priority?(CU_PRIORITY_IMP[task.priority.id]||"none"):"none";
  setSaving(true);
  try{
    // Fetch full task detail to get description and time_estimate
    let description = "";
    let estH = null;
    try{
      const full = await cuFetch("task/"+taskId);
      description = (full.description||"").trim();
      // time_estimate is in milliseconds
      if(full.time_estimate && full.time_estimate > 0){
        estH = Math.round((full.time_estimate / 3600000) * 100) / 100;
      }
    }catch(e){ /* non-fatal, proceed without */ }

    const sort_order = items.filter(i=>!i.done).length;
    // Build sub: note (description) + CU id + optional EST
    const subParts = (description ? description : "")
      + "||CU:"+taskId
      + (task.list&&task.list.name ? "||LIST:"+task.list.name : "")
      + (estH != null ? "||EST:"+estH : "");
    const [created] = await insertTask({
      owner:currentUser, text:task.name, sub:subParts,
      assignee:currentUser, added_by:currentUser, done:false,
      shared_id:null, importance:imp,
      due_date:due?due.isoDate:null, due_time:null, scheduled_date:null, sort_order
    });
    items.push(created);
    cuCopiedIds.add(task.id);
    // Assign the current user in ClickUp
    // Match by first name since cuUserIdMap keys are full names e.g. "holly baker"
    const cuUid = cuUserIdMap[currentUser.toLowerCase()] ||
      Object.entries(cuUserIdMap).find(([k])=>k.startsWith(currentUser.toLowerCase()))?.[1];
    console.log("cuCopyTask: currentUser="+currentUser+" cuUid="+cuUid+" cuUserIdMap=", cuUserIdMap);
    if(cuUid){
      fetch(CLAUDE_PROXY.replace(/\/$/, "")+"/clickup-write/task/"+taskId, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({_method:"PUT", assignees:{add:[cuUid], rem:[]}})
      }).then(r=>r.json()).then(d=>console.log("ClickUp assign result:",d)).catch(e=>console.error("ClickUp assign error:",e));
    }
    currentView="list";
    renderList();
    openModal(created.id);
  }catch(e){ showError("Could not add task: "+e.message); }
  setSaving(false);
}

function appendClaudeMsg(role, html, extraClass=""){
  const msgs = document.getElementById("claude-chat-messages");
  if(!msgs) return;

  div.className = "claude-msg "+role;

}

function buildClaudeContext(){
  const todayStr = isoToday();
  const active = items.filter(i=>!i.done);
  const done = items.filter(i=>i.done);
  const overdue = active.filter(i=>i.due_date && i.due_date < todayStr);

  const taskSummary = active.slice(0,60).map(i=>{
    const parts = [`"${i.text}"`];
    if(i.due_date) parts.push(`due:${i.due_date}`);
    if(i.assignee && i.assignee !== currentUser) parts.push(`assignee:${i.assignee}`);
    if(i.importance && i.importance !== "none") parts.push(`priority:${i.importance}`);
    const sched = getScheduledDates(i);
    if(sched.length) parts.push(`scheduled:${sched.join(",")}`);
    return parts.join(" ");
  }).join("\n");

  return `You are a helpful assistant embedded in a team task management app called Livetech Tasks.
Current user: ${currentUser}
Today: ${todayStr}
Team members: ${TEAM.join(", ")}

CURRENT USER'S ACTIVE TASKS (${active.length} total, ${overdue.length} overdue):
${taskSummary || "No active tasks"}

Completed tasks: ${done.length}

CAPABILITIES:
- Answer questions about tasks, workload, priorities, due dates
- Add new tasks: respond with a JSON block like: <ADDTASKS>[{"text":"...","assignee":"...","importance":"high|medium|low|none","due_date":"YYYY-MM-DD","scheduled_date":"YYYY-MM-DD"}]</ADDTASKS>
- For multiple tasks, include all in the array
- Keep responses concise and friendly
- If adding tasks, briefly confirm what you're adding before the JSON block
- Never make up tasks that weren't mentioned`;
}

async function sendClaudeChat(){
  const input = document.getElementById("claude-chat-input");
  const text = input.value.trim();
  if(!text || claudeChatPending) return;

  input.value = "";
  input.style.height = "auto";

  // Hide quick action buttons after first message
  const actions = document.getElementById("claude-chat-actions");
  if(actions) actions.style.display = "none";

  appendClaudeMsg("user", esc(text));

  claudeChatHistory.push({ role:"user", content: text });
  claudeChatPending = true;

  const sendBtn = document.getElementById("claude-chat-send");
  if(sendBtn) { sendBtn.disabled = true; sendBtn.textContent = "..."; }

  const thinkingEl = appendClaudeMsg("assistant", "Thinking...", "thinking");

  try{
    const systemPrompt = buildClaudeContext();
    const res = await fetch(CLAUDE_PROXY, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-20250514",
        max_tokens: 1000,
        system: systemPrompt,
        messages: claudeChatHistory
      })
    });
    const data = await res.json();
    const reply = data.content?.find(b=>b.type==="text")?.text || "Sorry, I couldn't get a response.";

    claudeChatHistory.push({ role:"assistant", content: reply });

    // Remove thinking bubble
    thinkingEl?.remove();

    // Check for ADDTASKS block
    const taskMatch = reply.match(/<ADDTASKS>([\s\S]*?)<\/ADDTASKS>/);
    if(taskMatch){
      const cleanText = reply.replace(/<ADDTASKS>[\s\S]*?<\/ADDTASKS>/g,"").trim();
      if(cleanText) appendClaudeMsg("assistant", esc(cleanText).replace(/\n/g,"<br>"));

      try{
        const parsed = JSON.parse(taskMatch[1].trim());
        claudeChatConfirmTasks = Array.isArray(parsed)?parsed:[parsed];
        renderChatTaskConfirm();
      }catch{
        appendClaudeMsg("assistant", "I tried to create tasks but had trouble parsing them. Could you try again?");
      }
    } else {
      appendClaudeMsg("assistant", esc(reply).replace(/\n/g,"<br>"));
    }

  }catch(e){
    thinkingEl?.remove();
    appendClaudeMsg("assistant", "Sorry, something went wrong. Please try again.");
  }

  claudeChatPending = false;
  if(sendBtn){ sendBtn.disabled = false; sendBtn.textContent = "Send"; }
}

function renderChatTaskConfirm(){
  const msgs = document.getElementById("claude-chat-messages");
  if(!msgs || !claudeChatConfirmTasks.length) return;

  const div = document.createElement("div");
  div.className = "claude-msg assistant";
  div.innerHTML = `<div class="claude-task-confirm">
    <div class="claude-task-confirm-title">Add these tasks to your list?</div>
    ${claudeChatConfirmTasks.map((t,i)=>`
      <div class="claude-task-confirm-item">
        <input type="checkbox" id="cct${i}" checked accent-color="#4caf82"/>
        <label for="cct${i}" style="font-size:12px;cursor:pointer;flex:1">${esc(t.text)}
          ${t.assignee?`<span style="font-size:10px;color:#3d9e70;background:#eef7f2;border-radius:20px;padding:1px 6px;margin-left:4px">→${esc(t.assignee)}</span>`:""}
          ${t.importance&&t.importance!=="none"?`<span style="font-size:10px;border-radius:20px;padding:1px 5px;margin-left:2px;background:${t.importance==="high"?"#fde8e8":t.importance==="medium"?"#fef0d8":"#fefde0"};color:${t.importance==="high"?"#c0392b":t.importance==="medium"?"#d68910":"#b7950b"}">${t.importance}</span>`:""}
          ${t.due_date?`<span style="font-size:10px;color:#888;background:#f0ede8;border-radius:20px;padding:1px 5px;margin-left:2px">📅${t.due_date}</span>`:""}
        </label>
      </div>`).join("")}
    <div class="claude-task-confirm-btns">
      <button class="claude-confirm-yes" onclick="confirmChatTasks(this)">Add selected</button>
      <button class="claude-confirm-no" onclick="this.closest('.claude-msg').remove()">Cancel</button>
    </div>
  </div>`;
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

async function confirmChatTasks(btn){
  const container = btn.closest(".claude-task-confirm");
  const checkboxes = container.querySelectorAll("input[type=checkbox]");
  const selected = claudeChatConfirmTasks.filter((_,i) => checkboxes[i]?.checked);
  if(!selected.length) return;

  btn.disabled = true; btn.textContent = "Adding...";
  setSaving(true);
  try{
    for(const t of selected){
      await addTaskSilent(t.text, t.assignee||"", t.importance||"none", t.due_date||"", "", t.scheduled_date||"");
    }
    renderList();
    btn.closest(".claude-msg").remove();
    appendClaudeMsg("assistant", `✅ Added ${selected.length} task${selected.length>1?"s":""} to your list!`);
  }catch(e){
    appendClaudeMsg("assistant", "Sorry, I couldn't add the tasks: "+esc(e.message));
  }
  setSaving(false);
  claudeChatConfirmTasks = [];
}

async function init(){
  // Handle redirect from Microsoft login
  try{
    const resp=await msalInstance.handleRedirectPromise();
    if(resp&&resp.account){
      msalInstance.setActiveAccount(resp.account);
    }
  }catch(e){
    renderMsLogin("Authentication error: "+e.message);
    return;
  }

  // Check if already signed in
  const accounts=msalInstance.getAllAccounts();
  if(accounts.length>0){
    msalInstance.setActiveAccount(accounts[0]);
    const account=accounts[0];
    const email=account.username||account.upn||"";
    const name=emailToTeamName(email);
    if(!name){
      // Signed in to Microsoft but not a recognised team member
      renderMsLogin(`Your account (${email}) is not on the Livetech team list. Contact your administrator.`);
      // Add sign out option
      const box=document.querySelector(".ms-login-box");
      if(box){
        const btn=document.createElement("button");
        btn.className="switch-btn";btn.style.marginTop="12px";btn.style.width="100%";
        btn.textContent="Sign out";btn.onclick=msSignOut;
        box.appendChild(btn);
      }
      return;
    }
    currentUser=name;
    saveSession(name);
    renderList(true);
    try{items=await loadTasks(name);}catch(e){showError("Could not load tasks: "+e.message);}
    await loadDelegatedTasks();
    loadNotifs();
    initNotifSnapshot();
    renderList(false);
    startRefresh();
    return;
  }

  // Not signed in — show Microsoft login screen
  renderMsLogin();
}

// Get current month string "apr-2026"
function getSeoMonth() {
  const d = new Date();
  return `${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
}

// Get month label "April 2026"
function getSeoMonthLabel(m) {
  const [mon, yr] = m.split('-');
  return new Date(yr, mon-1).toLocaleDateString('en-GB', {month:'long', year:'numeric'});
}

// Get month dropdown options (current + 6 future)
function getSeoMonthOptions() {
  const months = [];
  for (let i = 0; i < 6; i++) {
    const d = new Date();
    d.setMonth(d.getMonth() + i);
    const val = `${String(d.getMonth()+1).padStart(2,'0')}-${d.getFullYear()}`;
    const label = d.toLocaleDateString('en-GB', {month:'long', year:'numeric'});
    months.push(`<option value="${val}">${label}</option>`);
  }
  return months.join('');
}

function mrSelectClient(id, name) {
  _mrCurrentClientId = id;
  _mrCurrentClientName = name;
  _mrPerformanceCache = null;
  document.querySelectorAll('.mr-client-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`#mr-client-list .mr-client-btn[data-id="${id}"]`)?.classList.add('active');
  if (document.getElementById('mr-no-client')) document.getElementById('mr-no-client').style.display = 'none';
  if (document.getElementById('mr-content')) document.getElementById('mr-content').style.display = 'block';
  if (document.getElementById('mr-client-heading')) document.getElementById('mr-client-heading').textContent = name;
  mrLoadGscProperty();
  mrLoadSitemapUrl();
  mrLoadData();
}

async function mrLoadData() {
  const clientId = _mrCurrentClientId;
  const month = document.getElementById('mr-month')?.value;
  if (!clientId || !month) return;
  const dash = document.getElementById('mr-dashboard');
  const loading = document.getElementById('mr-loading');
  if (dash) dash.style.display = 'none';
  if (loading) loading.style.display = 'block';
  const scData = await loadScData(clientId, month);
  const selections = await loadScSelections(month, clientId);
  _mrScDataCache = scData;
  // Reset lazy-loaded URL lists so they refresh with new data
  document.querySelectorAll('.mr-url-list').forEach(ul => { ul.innerHTML = ''; delete ul.dataset.loaded; });
  if (loading) loading.style.display = 'none';
  if (dash) dash.style.display = 'block';
  // Restore findings: selections is [{name, urls}] or legacy string[]
  const findingsData = Array.isArray(selections) ? selections : [];
  // Clear existing dynamic finding rows and reset dropdown
  const mrList = document.getElementById('mr-findings-list');
  if (mrList) mrList.querySelectorAll('.mr-finding-row').forEach(r => r.remove());
  const mrEmpty = document.getElementById('mr-findings-empty');
  if (mrEmpty) mrEmpty.style.display = findingsData.length ? 'none' : 'block';
  const mrSel = document.getElementById('mr-finding-select');
  if (mrSel) Array.from(mrSel.options).forEach(o => o.style.display = '');
  // Re-add saved findings
  findingsData.forEach(f => {
    const name = typeof f === 'string' ? f : f.name;
    const count = f.count ?? '';
    const urls = f.urls || [];
    if (name) mrAddFinding(name, count, urls);
  });
  const tbody = document.getElementById('mr-tbody');
  if (tbody) {
    if (scData.length === 0) {
      tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;padding:20px;color:#aaa;font-size:13px">No data yet. Click Refresh SC Data to pull from BigQuery.</td></tr>';
    } else {
      const top3 = [...scData].sort((a, b) => (parseInt(b.clicks) || 0) - (parseInt(a.clicks) || 0)).slice(0, 3);
      tbody.innerHTML = top3.map(row => `
        <tr style="border-top:0.5px solid #f0ede8">
          <td style="padding:10px 12px;font-family:monospace;font-size:12px;color:#0066cc">${row.url}</td>
          <td style="padding:10px 12px;text-align:right;font-size:13px">${row.clicks}</td>
          <td style="padding:10px 12px;text-align:right;font-size:13px">${row.impressions}</td>
          <td style="padding:10px 12px;text-align:right;font-size:13px">${Number(row.avg_position).toFixed(1)}</td>
        </tr>`).join('');
    }
  }
}

async function mrRefresh() {
  const btn = document.getElementById('mr-refresh-btn');
  const month = document.getElementById('mr-month')?.value;
  if (!_mrCurrentClientId || !month) { showSeoMsg('mr-msg', 'Please select a client and month.', 'error'); return; }
  if (btn) { btn.disabled = true; btn.textContent = 'Pulling data...'; }
  const clientId = _mrCurrentClientId;
  const client = (_makeClientsCache || MAKE_CLIENTS_FALLBACK).find(c => c.id === clientId);
  const bqDataset = client?.bq_dataset || clientId;
  const [mm, yyyy] = month.split('-');
  const fromDate = `${yyyy}-${mm}-01`;
  const lastDay = new Date(parseInt(yyyy), parseInt(mm), 0).getDate();
  const toDate = `${yyyy}-${mm}-${String(lastDay).padStart(2,'0')}`;
  const sql = 'SELECT url, SUM(clicks) as clicks, SUM(impressions) as impressions, ROUND(AVG(sum_position),1) as avg_position ' +
    `FROM \`livetech-website.${bqDataset}.searchdata_url_impression\` ` +
    `WHERE data_date >= '${fromDate}' AND data_date <= '${toDate}' AND search_type = 'WEB' ` +
    'GROUP BY url ORDER BY impressions DESC LIMIT 100';
  try {
    const res = await fetch(CLAUDE_PROXY.replace(/\/$/, '') + '/bigquery', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ projectId: 'livetech-website', region: 'europe-west2', query: sql })
    });
    if (!res.ok) throw new Error(`BQ ${res.status}`);
    const data = await res.json();
    const rawRows = data.rows || [];
    if (!rawRows.length) { showSeoMsg('mr-msg', 'No data found in BigQuery for this period.', 'info'); return; }
    const rows = rawRows.map(r => r.f ? { url: r.f[0].v, clicks: r.f[1].v, impressions: r.f[2].v, avg_position: r.f[3].v } : r);
    const records = rows.map(r => ({ month, client_id: clientId, url: r.url, clicks: parseInt(r.clicks)||0, impressions: parseInt(r.impressions)||0, avg_position: parseFloat(r.avg_position)||0, source: 'search-console' }));
    // Delete old rows for this month/client then insert fresh
    await fetch(`${SUPABASE_URL}/rest/v1/sc_data?month=eq.${month}&client_id=eq.${encodeURIComponent(clientId)}`, {
      method: 'DELETE',
      headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
    });
    const upsert = await supabaseWrite('sc_data', records, 'return=minimal');
    if (!upsert.ok) throw new Error(`Supabase insert ${upsert.status}`);
    showSeoMsg('mr-msg', `Synced ${records.length} URLs. Click Inspect URLs to check for GSC issues.`, 'info');
    await mrLoadData();
  } catch(e) {
    console.error('mrRefresh error:', e);
    showSeoMsg('mr-msg', `Error: ${e.message}`, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.innerHTML = 'Refresh SC Data'; }
  }
}

async function mrInspect() {
  const btn = document.getElementById('mr-inspect-btn');
  const month = document.getElementById('mr-month')?.value;
  const clientId = _mrCurrentClientId;
  const gscProperty = document.getElementById('mr-gsc-property')?.value?.trim();
  if (!clientId) { showSeoMsg('mr-msg', 'Select a client first.', 'error'); return; }
  if (!gscProperty) { showSeoMsg('mr-msg', 'Enter a GSC Property URL first.', 'error'); return; }
  if (btn) { btn.disabled = true; btn.textContent = 'Fetching sitemap...'; }
  try {
    const base = gscProperty.replace(/\/$/, '');
    const customSitemap = document.getElementById('mr-sitemap-url')?.value?.trim();
    const proxy = CLAUDE_PROXY.replace(/\/$/, '');
    const sitemapUrlSet = new Set();

    async function addSitemapUrls(smUrl) {
      try {
        const r = await fetch(proxy + '/fetch-sitemap?url=' + encodeURIComponent(smUrl));
        const d = await r.json();
        if (r.ok && d.urls?.length) d.urls.forEach(u => sitemapUrlSet.add(u));
      } catch(_) {}
    }

    // Always try all sources and take the union — more sources = better coverage
    // 1. Custom sitemap if provided
    if (customSitemap) await addSitemapUrls(customSitemap);

    // 2. Sitemaps submitted in Google Search Console
    try {
      const gscSmRes = await fetch(proxy + '/gsc-sitemaps?siteUrl=' + encodeURIComponent(gscProperty));
      if (gscSmRes.ok) {
        const gscSmData = await gscSmRes.json();
        for (const sm of (gscSmData.sitemap || [])) {
          if (sm.path && sitemapUrlSet.size < 3000) await addSitemapUrls(sm.path);
        }
      }
    } catch(_) {}

    // 3. Auto-detect common paths (always run — fills gaps if GSC sitemaps are partial)
    for (const smUrl of [`${base}/sitemap_index.xml`, `${base}/sitemap.xml`, `${base}/wp-sitemap.xml`]) {
      if (sitemapUrlSet.size < 3000) await addSitemapUrls(smUrl);
    }

    let urlsToInspect = [...sitemapUrlSet];
    if (!urlsToInspect.length) { showSeoMsg('mr-msg', 'Could not fetch sitemap. Enter a Sitemap URL or check the GSC Property URL.', 'error'); return; }

    // Crawl the site to discover URLs not in the sitemap (linked pages, potential 404s, redirects)
    // Goes 3 levels deep: homepage → section pages → inner pages (product listings, archives, etc.)
    if (btn) btn.textContent = 'Crawling site for additional URLs...';
    const allUrlSet = new Set(urlsToInspect.map(u => u.replace(/\/+$/, '')));

    async function crawlPage(pageUrl) {
      try {
        const r = await fetch(CLAUDE_PROXY.replace(/\/$/, '') + '/crawl-site?url=' + encodeURIComponent(pageUrl));
        return r.ok ? ((await r.json()).urls || []) : [];
      } catch { return []; }
    }

    async function crawlBatch(urls) {
      const results = [];
      for (let i = 0; i < urls.length; i += 5) {
        const batch = await Promise.all(urls.slice(i, i + 5).map(crawlPage));
        results.push(...batch.flat());
      }
      return results;
    }

    try {
      // Depth 1: homepage
      const depth1All = await crawlPage(base);
      const depth1New = depth1All.filter(u => !allUrlSet.has(u.replace(/\/+$/, '')));
      depth1New.forEach(u => allUrlSet.add(u.replace(/\/+$/, '')));

      if (btn) btn.textContent = `Crawling depth 2 (${depth1New.length} pages)...`;
      // Depth 2: crawl ALL depth-1 pages (full, not sampled)
      const depth2All = await crawlBatch(depth1New);
      const depth2New = depth2All.filter(u => !allUrlSet.has(u.replace(/\/+$/, '')));
      depth2New.forEach(u => allUrlSet.add(u.replace(/\/+$/, '')));

      if (btn) btn.textContent = `Crawling depth 3 (sampling ${Math.min(depth2New.length, 100)} pages)...`;
      // Depth 3: crawl up to 100 depth-2 pages (sampled — avoids runaway on large sites)
      const depth3Sample = depth2New.slice(0, 100);
      const depth3All = await crawlBatch(depth3Sample);
      depth3All.filter(u => !allUrlSet.has(u.replace(/\/+$/, ''))).forEach(u => allUrlSet.add(u.replace(/\/+$/, '')));
    } catch(_) {}

    urlsToInspect = [...allUrlSet];
    const GSC_DAILY_CAP = 2000;
    if (urlsToInspect.length > GSC_DAILY_CAP) {
      showSeoMsg('mr-msg', `Found ${urlsToInspect.length} URLs — capping at ${GSC_DAILY_CAP} (GSC daily quota). Sitemap URLs inspected first.`, 'info');
      urlsToInspect = urlsToInspect.slice(0, GSC_DAILY_CAP);
    }

    // Each worker call is a separate invocation (Cloudflare free plan: 50 subrequests/invocation,
    // 1 used for Google auth token). Send 45 URLs per call.
    const CHUNK = 45;
    const allInspected = [];
    for (let i = 0; i < urlsToInspect.length; i += CHUNK) {
      const chunk = urlsToInspect.slice(i, i + CHUNK);
      if (btn) btn.textContent = `Inspecting ${Math.min(i + CHUNK, urlsToInspect.length)} of ${urlsToInspect.length} URLs...`;
      const inspectRes = await fetch(CLAUDE_PROXY.replace(/\/$/, '') + '/gsc-inspect', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ siteUrl: gscProperty, urls: chunk })
      });
      if (!inspectRes.ok) throw new Error(`GSC error ${inspectRes.status}`);
      const chunkResults = await inspectRes.json();
      allInspected.push(...chunkResults);
    }
    const inspected = allInspected;
    const ok = inspected.filter(i => !i.error);
    const errors = inspected.filter(i => i.error);

    const findingGroups = {};
    ok.forEach(item => {
      const finding = mrMapCoverageState(item.coverageState);
      if (!finding) return;
      if (!findingGroups[finding]) findingGroups[finding] = [];
      findingGroups[finding].push(item.url);
    });

    const autoFindings = Object.entries(findingGroups).map(([name, urls]) => ({ name, count: urls.length, urls }));
    if (autoFindings.length) {
      await saveScSelections(month, clientId, autoFindings);
      const total = autoFindings.reduce((s, f) => s + f.urls.length, 0);
      showSeoMsg('mr-msg', `Found ${autoFindings.length} issue type(s) across ${total} URLs (${ok.length} of ${urlsToInspect.length} inspected — sitemap + crawled pages).`, 'success');
    } else if (errors.length === inspected.length && inspected.length > 0) {
      const sample = errors[0]?.error || 'unknown error';
      showSeoMsg('mr-msg', `All URL checks failed — ensure the service account has Full access to this GSC property. First error: ${sample}`, 'error');
    } else {
      showSeoMsg('mr-msg', `Inspected ${ok.length} URLs — all indexed, no issues found.`, 'info');
    }
    await mrLoadData();
  } catch(e) {
    showSeoMsg('mr-msg', `Inspection error: ${e.message}${e.cause ? ' — ' + e.cause : ''}`, 'error');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Inspect URLs'; }
  }
}

async function mrSave() {
  if (!_mrCurrentClientId) return;
  const month = document.getElementById('mr-month')?.value;
  if (!month) return;
  const findings = [];
  document.querySelectorAll('.mr-finding-row').forEach(row => {
    const name = row.querySelector('.mr-finding-name')?.textContent?.trim();
    const count = null;
    const selectedUrls = Array.from(row.querySelectorAll('.mr-url-list input[type="checkbox"]:checked')).map(u => u.dataset.url);
    if (name) findings.push({ name, count, urls: selectedUrls });
  });
  try {
    await saveScSelections(month, _mrCurrentClientId, findings);
    showSeoMsg('mr-msg', `Saved ${findings.length} finding${findings.length!==1?'s':''}.`, 'success');
  } catch(e) {
    showSeoMsg('mr-msg', `Error saving: ${e.message}`, 'error');
  }
}

function mrEnsureUrls(urlList, findingName, callback) {
  if (urlList.dataset.loaded) { if (callback) callback(); return; }
  if (!_mrScDataCache?.length) {
    urlList.innerHTML = '<p style="color:#aaa;font-size:12px;padding:4px 0">No SC data yet — click Refresh SC Data first.</p>';
    return;
  }
  urlList.innerHTML = _mrScDataCache.map(u =>
    `<label style="display:flex;align-items:flex-start;gap:8px;padding:5px 0;cursor:pointer;border-bottom:0.5px solid #f5f5f3">
      <input type="checkbox" data-url="${u.url}" onchange="mrUpdateFindingCount(this.closest('.mr-finding-row'))" style="margin-top:2px;flex-shrink:0;accent-color:var(--navy)">
      <span style="font-family:monospace;font-size:11px;word-break:break-all;color:#0066cc;flex:1">${u.url}</span>
      <span style="color:#888;font-size:11px;white-space:nowrap">${u.clicks} clicks</span>
    </label>`
  ).join('');
  urlList.dataset.loaded = '1';
  if (callback) callback();
}

function mrMapCoverageState(state) {
  if (!state) return null;
  const s = state.toLowerCase().replace(/['']/g, "'").trim();
  // Return null for indexed pages (no finding needed)
  if (s === 'submitted and indexed' || s === 'indexed, not submitted in sitemap' || s === 'indexed') return null;
  // Map to our SC_FINDINGS names
  const map = {
    'crawled - currently not indexed': 'Crawled – currently not indexed',
    'discovered - currently not indexed': 'Discovered – currently not indexed',
    'page with redirect': 'Page with redirect',
    'not found (404)': 'Not found (404)',
    'soft 404': 'Soft 404',
    'blocked by robots.txt': 'Blocked by robots.txt',
    'duplicate without user-selected canonical': 'Duplicate without user-selected canonical',
    'alternative page with proper canonical tag': 'Alternative page with proper canonical tag',
    "excluded by 'noindex' tag": 'Excluded by noindex tag',
    'excluded by noindex tag': 'Excluded by noindex tag',
    'blocked due to access forbidden (403)': 'Blocked due to access forbidden (403)',
    'server error (5xx)': 'Server error (5xx)',
    'blocked due to other 4xx issue': 'Blocked due to other 4xx issue',
  };
  return map[s] || null; // null = indexed/unknown, don't create a finding
}

function mrAddFinding(name, gscCount, savedUrls) {
  const list = document.getElementById('mr-findings-list');
  if (!list) return;
  const empty = document.getElementById('mr-findings-empty');
  if (empty) empty.style.display = 'none';
  const rowCount = list.querySelectorAll('.mr-finding-row').length;

  div.innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer" onclick="mrToggleFinding(this)">
      <span class="mr-finding-name" style="font-size:13px;flex:1">${name}</span>

      <span class="mr-finding-caret" style="font-size:11px;color:#aaa">▸</span>
      <button onclick="event.stopPropagation();mrRemoveFinding(this)"
        style="background:none;border:none;color:#ccc;cursor:pointer;font-size:18px;padding:0 2px;line-height:1;font-family:inherit">&times;</button>
    </div>
    <div class="mr-finding-body" style="display:none;padding:0 14px 12px 14px">
      <div class="mr-url-list" style="max-height:220px;overflow-y:auto;font-size:12px"></div>
    </div>`;
  list.appendChild(div);
  // Hide this option in the dropdown
  const sel = document.getElementById('mr-finding-select');
  if (sel) Array.from(sel.options).forEach(o => { if (o.value === name) o.style.display = 'none'; });
  // Restore saved URLs — render directly (not from BigQuery list)
  if (savedUrls?.length) {

    body.style.display = 'block';
    caret.textContent = '▾';
    const urlList = div.querySelector('.mr-url-list');

  }

}

function mrFormatNum(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  if (n >= 1000000) return (n / 1000000).toFixed(1).replace(/\.0$/, '') + 'M';
  if (n >= 1000) return (n / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
  return String(n);
}

async function mrLoadPerformanceData() {
  if (!_mrCurrentClientId) return;
  if (_mrPerformanceCache) { mrRenderPerformance(_mrPerformanceCache); return; }
  const month = document.getElementById('mr-month')?.value;
  if (!month) return;
  const perfLoading = document.getElementById('mr-perf-loading');
  const perfContent = document.getElementById('mr-perf-content');
  const perfEmpty = document.getElementById('mr-perf-empty');
  if (perfLoading) perfLoading.style.display = 'block';
  if (perfContent) perfContent.style.display = 'none';
  if (perfEmpty) perfEmpty.style.display = 'none';
  const clientId = _mrCurrentClientId;
  const client = (_makeClientsCache || MAKE_CLIENTS_FALLBACK).find(c => c.id === clientId);
  const bqDataset = client?.bq_dataset || clientId;
  const [mm, yyyy] = month.split('-');
  const fromDate = `${yyyy}-${mm}-01`;
  const lastDay = new Date(parseInt(yyyy), parseInt(mm), 0).getDate();
  const toDate = `${yyyy}-${mm}-${String(lastDay).padStart(2,'0')}`;
  const baseFrom = `FROM \`livetech-website.${bqDataset}.searchdata_url_impression\` WHERE data_date >= '${fromDate}' AND data_date <= '${toDate}' AND search_type = 'WEB'`;
  const statsSQL = `SELECT SUM(clicks) as total_clicks, SUM(impressions) as total_impressions, ROUND(SAFE_DIVIDE(SUM(clicks), SUM(impressions)) * 100, 2) as avg_ctr ${baseFrom}`;
  const queriesSQL = `SELECT query, SUM(clicks) as clicks, SUM(impressions) as impressions ${baseFrom} AND is_anonymized_query = false GROUP BY query ORDER BY clicks DESC LIMIT 10`;
  try {
    const [statsRes, queriesRes] = await Promise.all([
      fetch(CLAUDE_PROXY.replace(/\/$/, '') + '/bigquery', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ projectId: 'livetech-website', region: 'europe-west2', query: statsSQL })
      }),
      fetch(CLAUDE_PROXY.replace(/\/$/, '') + '/bigquery', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ projectId: 'livetech-website', region: 'europe-west2', query: queriesSQL })
      })
    ]);
    const [statsData, queriesData] = await Promise.all([statsRes.json(), queriesRes.json()]);
    const sRow = (statsData.rows || [])[0];
    const stats = sRow?.f
      ? { total_clicks: parseInt(sRow.f[0].v) || 0, total_impressions: parseInt(sRow.f[1].v) || 0, avg_ctr: parseFloat(sRow.f[2].v) || 0 }
      : (sRow || { total_clicks: 0, total_impressions: 0, avg_ctr: 0 });
    const queries = (queriesData.rows || []).map(r => r.f
      ? { query: r.f[0].v, clicks: parseInt(r.f[1].v) || 0, impressions: parseInt(r.f[2].v) || 0 }
      : r
    );
    _mrPerformanceCache = { stats, queries };
    mrRenderPerformance(_mrPerformanceCache);
  } catch(e) {
    console.error('mrLoadPerformanceData error:', e);
    if (perfLoading) perfLoading.style.display = 'none';
    if (perfEmpty) { perfEmpty.style.display = 'block'; perfEmpty.textContent = 'Error loading performance data: ' + e.message; }
  }
}

function mrRenderPerformance({ stats, queries }) {
  const perfLoading = document.getElementById('mr-perf-loading');
  const perfContent = document.getElementById('mr-perf-content');
  const perfEmpty = document.getElementById('mr-perf-empty');
  if (perfLoading) perfLoading.style.display = 'none';
  if (stats.total_impressions === 0 && stats.total_clicks === 0) {
    if (perfEmpty) { perfEmpty.style.display = 'block'; perfEmpty.textContent = 'No performance data found for this period. Click Refresh SC Data to pull from BigQuery.'; }
    return;
  }
  if (perfContent) perfContent.style.display = 'block';
  if (perfEmpty) perfEmpty.style.display = 'none';
  const clicks = document.getElementById('mr-perf-clicks');
  const impressions = document.getElementById('mr-perf-impressions');
  const ctr = document.getElementById('mr-perf-ctr');
  if (clicks) clicks.textContent = mrFormatNum(stats.total_clicks);
  if (impressions) impressions.textContent = mrFormatNum(stats.total_impressions);
  if (ctr) ctr.textContent = stats.avg_ctr != null ? stats.avg_ctr.toFixed(2) + '%' : '—';
  const heading = document.getElementById('mr-perf-client-heading');
  if (heading) heading.textContent = _mrCurrentClientName || '';
  const qtbody = document.getElementById('mr-queries-tbody');
  if (qtbody) {
    if (!queries.length) {
      qtbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:16px;color:#aaa;font-size:13px">No query data available.</td></tr>';
    } else {
      qtbody.innerHTML = queries.map(q => `
        <tr style="border-top:0.5px solid #f0ede8">
          <td style="padding:10px 12px;font-size:13px;color:#333">${q.query}</td>
          <td style="padding:10px 12px;text-align:right;font-size:13px">${mrFormatNum(q.clicks)}</td>
          <td style="padding:10px 12px;text-align:right;font-size:13px">${mrFormatNum(q.impressions)}</td>
        </tr>`).join('');
    }
  }
}

async function mnLoad() {
  const clientId = _mnCurrentClientId;
  const month = document.getElementById('mn-month')?.value;
  if (!clientId || !month) return;
  // Clear all fields
  ['mn-activity','mn-tasks','mn-planned','mn-keywords','mn-audit','mn-upselling','mn-competitors','mn-comments','mn-date'].forEach(id => {
    const el = document.getElementById(id); if (el) el.value = '';
  });
  document.querySelectorAll('input[name="mn-checklist"]').forEach(r => r.checked = false);
  const scDiv = document.getElementById('mn-sc-auto');
  if (scDiv) scDiv.innerHTML = '<em>No SC data selected yet &mdash; Sarah selects URLs in Marketing Review.</em>';
  ['mn-screenshots-list','mn-wphealth-list'].forEach(id => {
    const el = document.getElementById(id); if (el) { el.innerHTML = ''; el.dataset.urls = '[]'; }
  });
  // Load saved note for this user
  const note = await loadMeetingNoteData(month, clientId);
  if (note) {
    const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val||''; };
    set('mn-activity',  note.client_activity);
    set('mn-tasks',     note.tasks_carried_out);
    set('mn-planned',   note.planned_work);
    set('mn-keywords',  note.focus_keywords);
    set('mn-audit',     note.website_audit);
    set('mn-upselling', note.upselling);
    set('mn-competitors',note.competitors);
    set('mn-comments',  note.comments);
    set('mn-date',      note.meeting_date);
    if (note.checklist_status) {
      const r = document.querySelector(`input[name="mn-checklist"][value="${note.checklist_status}"]`);
      if (r) r.checked = true;
    }
    if (note.sc_tasks && scDiv) scDiv.innerHTML = note.sc_tasks;
    if (note.screenshots) mnRenderFileList('mn-screenshots-list', note.screenshots);
    if (note.wp_health)   mnRenderFileList('mn-wphealth-list',   note.wp_health);
  }
  // Auto-populate SC tasks from Sarah's findings selections
  const selections = await loadScSelections(month, clientId);
  if (selections.length > 0 && scDiv) {
    const lines = selections.map(s => {
      const name = typeof s === 'string' ? s : s.name;
      const urls = s.urls?.length ? s.urls.map(u => `<br>&nbsp;&nbsp;&bull; <code style="font-size:11px">${u}</code>`).join('') : '';
      return `<strong>${name}</strong>${urls}`;
    });
    scDiv.innerHTML = lines.join('<br><br>');
  }
}

async function mnSave() {
  const clientId = _mnCurrentClientId;
  const month = document.getElementById('mn-month')?.value;
  if (!clientId || !month) { showSeoMsg('mn-status', 'No client selected.', 'error'); return; }
  const get = id => document.getElementById(id)?.value || '';
  const fields = {
    meeting_date:     get('mn-date'),

    planned_work:     get('mn-planned'),
    checklist_status: document.querySelector('input[name="mn-checklist"]:checked')?.value || 'pending',
    focus_keywords:   get('mn-keywords'),
    website_audit:    get('mn-audit'),
    upselling:        get('mn-upselling'),
    competitors:      get('mn-competitors'),
    comments:         get('mn-comments'),
    sc_tasks:         document.getElementById('mn-sc-auto')?.innerHTML || '',
    screenshots:      document.getElementById('mn-screenshots-list')?.dataset.urls || '[]',

  showSeoMsg('mn-status', ok ? 'Saved!' : 'Error saving. Check console.', ok ? 'success' : 'error');
}

  }
  const clientName = _mnCurrentClientName || 'Client';
  const month = document.getElementById('mn-month')?.value || getSeoMonth();
  const monthLabel = getSeoMonthLabel(month);
  const filename = `${clientName.replace(/\s+/g,'-')}-${monthLabel.replace(/\s+/g,'-')}-meeting-notes.pdf`;
  const doExport = () => {
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'font-family:Arial,sans-serif;padding:28px;color:#1a1a1a;max-width:800px';
    wrapper.innerHTML =
      `<div style="margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #14134f">` +
      `<h1 style="font-size:20px;color:#14134f;margin:0">${clientName} — SEO Meeting Notes</h1>` +
      `<p style="font-size:13px;color:#888;margin:4px 0 0">${monthLabel}</p></div>` +
      form.innerHTML;
    wrapper.querySelectorAll('button,.seo-btn,#mn-status,label.mn-upload-area').forEach(el => el.remove());
    wrapper.querySelectorAll('textarea').forEach(ta => {
      const p = document.createElement('p');
      p.style.cssText = 'font-size:13px;white-space:pre-wrap;margin:4px 0 12px;min-height:16px;line-height:1.5';
      p.textContent = ta.value; ta.parentNode.replaceChild(p, ta);
    });
    wrapper.querySelectorAll('input[type=date]').forEach(inp => {
      const span = document.createElement('span');
      span.style.cssText = 'font-size:13px'; span.textContent = inp.value;
      inp.parentNode.replaceChild(span, inp);
    });
    document.body.appendChild(wrapper);
    html2pdf().set({
      margin:[12,12,12,12], filename,
      html2canvas:{scale:2,useCORS:true},
      jsPDF:{unit:'mm',format:'a4',orientation:'portrait'}
    }).from(wrapper).save().then(() => {
      document.body.removeChild(wrapper); showSeoMsg('mn-status','PDF exported!','success');
    }).catch(() => {
      document.body.removeChild(wrapper); showSeoMsg('mn-status','PDF export failed.','error');
    });
  };
  if (typeof html2pdf !== 'undefined') { doExport(); }
  else {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
    s.onload = doExport;
    s.onerror = () => showSeoMsg('mn-status','Could not load PDF library.','error');
    document.head.appendChild(s);
  }
}

async function mnHandleFileUpload(event, field) {
  const files = Array.from(event.target.files);
  if (!files.length || !_mnCurrentClientId) return;
  const month = document.getElementById('mn-month')?.value || getSeoMonth();
  const listId = field === 'screenshots' ? 'mn-screenshots-list' : 'mn-wphealth-list';
  const listEl = document.getElementById(listId);
  if (!listEl) return;
  const existing = JSON.parse(listEl.dataset.urls || '[]');
  for (const file of files) {
    try {
      const url = await uploadMeetingFile(file, _mnCurrentClientId, month, field);
      existing.push({ url, name: file.name });
    } catch(e) {
      console.error('Upload error:', e);
      existing.push({ url: '', name: file.name });
    }
  }
  listEl.dataset.urls = JSON.stringify(existing);
  mnRenderFileList(listId, JSON.stringify(existing));
}

function mnRenderFileList(containerId, urlsJson) {
  const el = document.getElementById(containerId);
  if (!el) return;
  let items = [];
  try { items = JSON.parse(urlsJson || '[]'); } catch(e) {}
  el.dataset.urls = JSON.stringify(items);
  el.innerHTML = items.map(item =>
    item.url
      ? `<a href="${item.url}" target="_blank" class="mn-upload-link">${item.name}</a>`
      : `<span class="mn-upload-link" style="background:#fff3cd;color:#856404">${item.name}</span>`
  ).join('');
}

async function uploadMeetingFile(file, clientId, month, fieldName) {
  const safe = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  const path = `${clientId}/${month}/${fieldName}-${Date.now()}-${safe}`;
  const res = await fetch(`${SUPABASE_URL}/storage/v1/object/meeting-notes/${path}`, {
    method: 'POST',
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': file.type || 'application/octet-stream', 'x-upsert': 'true' },
    body: file
  });
  if (!res.ok) throw new Error(`Upload ${res.status}`);
  return `${SUPABASE_URL}/storage/v1/object/public/meeting-notes/${path}`;
}

// Shared SEO helpers
function showSeoMsg(id, msg, type) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.display = 'flex';
  el.style.alignItems = 'center';
  el.style.gap = '8px';
  el.style.background = type === 'success' ? '#d1fae5' : type === 'error' ? '#fee2e2' : '#eff6ff';
  el.style.color = type === 'success' ? '#065f46' : type === 'error' ? '#991b1b' : '#1e40af';
  const dismiss = `<span onclick="document.getElementById('${id}').style.display='none'" style="cursor:pointer;margin-left:auto;font-size:16px;line-height:1;opacity:0.6">×</span>`;
  el.innerHTML = `<span style="flex:1">${msg}</span>${dismiss}`;
  // Errors stay until dismissed; success/info auto-hide after 6 seconds
  if (type !== 'error') setTimeout(() => { el.style.display = 'none'; }, 6000);
}

async function loadMakeClientsIntoDropdown() {
  let clients = _makeClientsCache;
  if (!clients) {
    try {
      // Worker handles all pagination server-side — one request returns all records
      const res = await fetch(CLAUDE_PROXY.replace(/\/$/, '') + '/make-clients');
      if (!res.ok) throw new Error('fetch failed ' + res.status);
      const data = await res.json();
      const allRecords = data.records || [];
      console.log('[Make] total records loaded:', allRecords.length);
      if (!allRecords.length) throw new Error('empty response');
      // Normalise assignee to capitalised first name so filter comparisons are reliable.
      // Handles: "charlie.wells@livetech.co.uk" → "Charlie", "Megan" → "Megan", "sarah jones" → "Sarah"
      const normaliseAssignee = (raw) => {
        if (!raw) return '';
        const local = raw.toLowerCase().split('@')[0];   // strip domain
        const first = local.split(/[._\s]/)[0];          // first word before dot/underscore/space
        return first.charAt(0).toUpperCase() + first.slice(1);
      };
      const mapped = allRecords.map(r => {
        const v = r.data || r;
        const name = v['Client Name'] || v.name || v.client_name || v['Name'] || r.key;
        const rawAssignee = v['Assignee'] || v.assignee || v['Assigned To'] || v.assigned_to || '';
        const assignee = normaliseAssignee(rawAssignee);
        const bq = v.bq_dataset || v.dataset || v.bigquery_dataset
          || Object.values(v).find(val => typeof val === 'string' && val.startsWith('searchconsole_')) || '';
        const wpUrl = v['WP URL'] || v.wp_url || v.website || v.url || '';
        return { id: bq || r.key, name, bq_dataset: bq, assignee, drive_folder_id: v.drive_folder_id || '', wp_url: wpUrl };
      }).filter(c => c.id);
      if (!mapped.length) throw new Error('no valid records after mapping');
      clients = mapped;
      _makeClientsCache = clients;
      console.log('[Make] loaded', clients.length, 'clients:', mapped.map(c => `${c.name}(${c.assignee})`).join(', '));
    } catch(e) {
      console.warn('[Make] falling back to hardcoded list:', e.message);
      clients = MAKE_CLIENTS_FALLBACK.map(c => ({ ...c }));
      _makeClientsCache = clients;
    }
  }

  // Extract first name from email or raw string (e.g. "megan@livetech.co.uk" → "Megan")
  const toFirstName = (str) => {
    const raw = str.includes('@') ? str.split('@')[0] : str;
    return raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase();
  };

  const buildGroupedSidebar = (list, onclickFn) => {
    const grouped = {};
    list.forEach(c => { const k = c.assignee || 'Unassigned'; if (k === 'Unassigned' || k === 'Holly') return; if (!grouped[k]) grouped[k] = []; grouped[k].push(c); });
    const order = ['sarah','charlie','megan','sabrina'];
    const keys = Object.keys(grouped).sort((a,b) => {
      const an = a.toLowerCase().split('@')[0], bn = b.toLowerCase().split('@')[0];
      const ai = order.indexOf(an), bi = order.indexOf(bn);
      return (ai===-1?99:ai)-(bi===-1?99:bi);
    });
    return keys.map(assignee => `
      <div class="mn-group">
        <button class="mn-group-toggle" onclick="toggleSidebarGroup(this)">${toFirstName(assignee)} <span class="mn-group-caret">▸</span></button>
        <div class="mn-group-clients" style="display:none">
          ${grouped[assignee].map(c =>
            `<button class="mn-client-btn ${onclickFn==='mrSelectClient'?'mr-client-btn':''}" data-id="${c.id}" onclick='${onclickFn}(${JSON.stringify(c.id)},${JSON.stringify(c.name)})'>${c.name}</button>`
          ).join('')}
        </div>
      </div>`).join('');
  };

  // Marketing Review sidebar — grouped by assignee (Sarah sees all)
  const mrList = document.getElementById('mr-client-list');
  if (mrList) {
    mrList.innerHTML = buildGroupedSidebar(clients, 'mrSelectClient');
    if (_mrCurrentClientId) {
      const activeBtn = document.querySelector(`#mr-client-list .mr-client-btn[data-id="${_mrCurrentClientId}"]`);
      if (activeBtn) { activeBtn.classList.add('active'); activeBtn.closest('.mn-group-clients').style.display='block'; activeBtn.closest('.mn-group').querySelector('.mn-group-caret').textContent='▾'; }
    }
  }

  // Meeting Notes sidebar — admins see all when browsing own view; team-view shows only the viewed user's clients
  const mnList = document.getElementById('mn-client-list');
  if (mnList) {
    const mnViewingUser = isTeamView() ? teamViewUser : currentUser;
    const isAdmin = (currentUser === SEO_MARKETING_HEAD || currentUser === 'Holly') && !isTeamView();
    const filtered = isAdmin
      ? clients
      : clients.filter(c => c.assignee && c.assignee.toLowerCase() === mnViewingUser.toLowerCase());
    if (filtered.length) {
      if (isAdmin) {
        mnList.innerHTML = buildGroupedSidebar(filtered, 'mnSelectClient');
      } else {
        mnList.innerHTML = filtered.map(c =>
          `<button class="mn-client-btn" data-id="${c.id}" onclick='mnSelectClient(${JSON.stringify(c.id)},${JSON.stringify(c.name)})'>${c.name}</button>`
        ).join('');
      }
      if (_mnCurrentClientId) document.querySelector(`#mn-client-list .mn-client-btn[data-id="${_mnCurrentClientId}"]`)?.classList.add('active');
    } else {
      mnList.innerHTML = '<span style="font-size:13px;color:#aaa">No clients assigned</span>';
    }
  }
}

function toggleSidebarGroup(btn) {
  const clients = btn.nextElementSibling;
  const caret = btn.querySelector('.mn-group-caret');
  const isOpen = clients.style.display !== 'none';
  clients.style.display = isOpen ? 'none' : 'block';
  if (caret) caret.textContent = isOpen ? '▸' : '▾';
}
